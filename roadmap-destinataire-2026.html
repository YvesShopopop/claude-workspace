<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Roadmap Destinataire 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #333; }

    .page-header {
      background: #1a1a2e; color: white;
      padding: 14px 24px; display: flex; align-items: baseline; gap: 16px;
    }
    .page-header h1 { font-size: 17px; font-weight: 700; }
    .page-header .meta { font-size: 12px; color: #888; }

    /* ── Filter bar ── */
    .filter-bar {
      background: white; padding: 8px 24px;
      display: flex; gap: 10px; align-items: center;
      border-bottom: 1px solid #e0e0e0; flex-wrap: wrap;
    }
    .filter-label { font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: .4px; margin-right: 2px; }
    .q-btn {
      padding: 4px 14px; border-radius: 16px;
      border: 1.5px solid #ddd; cursor: pointer;
      font-size: 11px; font-weight: 700;
      background: #f5f5f5; color: #bbb;
      transition: all 0.15s;
      user-select: none;
    }
    .q-btn:hover { filter: brightness(0.95); }
    .q-btn.active-q1 { background: #e3f2fd; color: #0d47a1; border-color: #90caf9; }
    .q-btn.active-q2 { background: #e8f5e9; color: #1b5e20; border-color: #a5d6a7; }
    .q-btn.active-q3 { background: #fff8e1; color: #e65100; border-color: #ffcc80; }
    .q-btn.active-q4 { background: #fce4ec; color: #880e4f; border-color: #f48fb1; }
    .q-btn-all {
      padding: 4px 12px; border-radius: 16px;
      border: 1.5px solid #ccc; cursor: pointer;
      font-size: 11px; font-weight: 600;
      background: white; color: #666;
      transition: all 0.15s;
    }
    .q-btn-all:hover { background: #f5f5f5; }

    /* ── Legend ── */
    .legend {
      background: white; padding: 8px 24px;
      display: flex; gap: 18px; align-items: center;
      border-bottom: 1px solid #e0e0e0; flex-wrap: wrap;
    }
    .legend-label { font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: .4px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #555; }
    .legend-dot { width: 12px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    .container { padding: 14px 16px; overflow-x: auto; }

    .gantt {
      background: white; border-radius: 8px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.10);
      overflow: hidden; min-width: 900px;
    }

    /* ── Rows ── */
    .row { display: flex; border-bottom: 1px solid #f0f0f0; }

    .label-cell {
      flex: 0 0 230px; padding: 0 10px;
      display: flex; align-items: center; gap: 6px;
      border-right: 2px solid #e0e0e0; min-height: 36px;
    }
    .epic-key { font-size: 10px; color: #bbb; font-family: monospace; flex-shrink: 0; }
    .epic-title { font-size: 12px; color: #444; line-height: 1.3; }

    .tl-cell { flex: 1; position: relative; min-height: 36px; overflow: hidden; }

    /* Quarter header */
    .q-header-row .label-cell {
      background: #f8f9fa; font-weight: 700; font-size: 11px;
      color: #888; text-transform: uppercase; letter-spacing: .5px;
    }
    .q-header-row .tl-cell { position: relative; height: 28px; }

    .q-cell {
      position: absolute; top: 0; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 12px;
      border-right: 2px solid #ccc; overflow: hidden;
    }
    .q1 { background: #e3f2fd; color: #0d47a1; }
    .q2 { background: #e8f5e9; color: #1b5e20; }
    .q3 { background: #fff8e1; color: #e65100; }
    .q4 { background: #fce4ec; color: #880e4f; }

    /* Sprint header */
    .s-header-row .label-cell { background: #f8f9fa; }
    .s-header-row .tl-cell { position: relative; height: 22px; border-bottom: 2px solid #ddd; }

    .s-cell {
      position: absolute; top: 0; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 600; color: #888;
      border-right: 1px solid #eee; overflow: hidden; cursor: default;
    }
    .s-cell.current  { background: #fff8f0; color: #e65100; font-weight: 800; }
    .s-cell.last-sprint { background: #f3e5f5; color: #6a1b9a; font-weight: 700; border-right: 2px solid #ccc; }

    .year-end-zone {
      position: absolute; top: 0; bottom: 0;
      background: repeating-linear-gradient(45deg, transparent, transparent 4px, rgba(0,0,0,0.03) 4px, rgba(0,0,0,0.03) 8px);
      pointer-events: none;
    }

    /* Group header */
    .group-row .label-cell {
      background: #f5f7fa; font-weight: 700; font-size: 11px;
      text-transform: uppercase; letter-spacing: .5px; color: #666;
      border-bottom: 1px solid #e8e8e8;
    }
    .group-row .tl-cell { background: #f5f7fa; border-bottom: 1px solid #e8e8e8; }

    /* Bars */
    .bar {
      position: absolute; height: 20px; top: 8px;
      border-radius: 4px; display: flex; align-items: center;
      justify-content: center; font-size: 9px; font-weight: 700;
      color: white; white-space: nowrap; overflow: hidden;
      padding: 0 5px; cursor: pointer;
      transition: filter .15s;
      text-shadow: 0 1px 1px rgba(0,0,0,.25);
    }
    .bar:hover { filter: brightness(1.12); }
    .bar-done      { background: #43a047; }
    .bar-dev       { background: #fb8c00; }
    .bar-ready     { background: #1e88e5; }
    .bar-discovery { background: #8e24aa; }
    .bar-parking   { background: #b0bec5; }

    /* Today marker */
    .today-line {
      position: absolute; top: 0; bottom: 0;
      width: 2px; background: #e53935;
      z-index: 10; pointer-events: none;
    }
    .today-label {
      position: absolute; top: 1px;
      left: 50%; transform: translateX(-50%);
      background: #e53935; color: white;
      font-size: 8px; font-weight: 700;
      padding: 1px 3px; border-radius: 2px; white-space: nowrap;
    }

    .no-date {
      position: absolute; top: 50%; right: 12px;
      transform: translateY(-50%);
      font-size: 10px; color: #ccc; font-style: italic;
    }

    /* Tooltip */
    #tooltip {
      position: fixed; background: rgba(20,20,40,.92); color: white;
      padding: 8px 12px; border-radius: 6px; font-size: 12px;
      pointer-events: none; z-index: 1000; max-width: 260px;
      display: none; line-height: 1.5;
    }
    #tooltip .t-key   { font-size: 10px; color: #aaa; }
    #tooltip .t-title { font-weight: 600; margin: 1px 0 4px; }
    #tooltip .t-dates { font-size: 11px; color: #ccc; }
    #tooltip .t-status{ margin-top: 3px; font-size: 11px; }

    /* Empty group hidden */
    .row.hidden { display: none; }
  </style>
</head>
<body>

<div class="page-header">
  <h1>📅 Roadmap Destinataire 2026</h1>
  <span class="meta">Mis à jour le 9 mars 2026</span>
</div>

<!-- Filter bar -->
<div class="filter-bar">
  <span class="filter-label">Vue :</span>
  <button class="q-btn active-q1" data-q="Q1" onclick="toggleQ('Q1',this)">Q1</button>
  <button class="q-btn active-q2" data-q="Q2" onclick="toggleQ('Q2',this)">Q2</button>
  <button class="q-btn active-q3" data-q="Q3" onclick="toggleQ('Q3',this)">Q3</button>
  <button class="q-btn active-q4" data-q="Q4" onclick="toggleQ('Q4',this)">Q4</button>
  <button class="q-btn-all" onclick="selectAll()">Tout afficher</button>
</div>

<!-- Legend -->
<div class="legend">
  <span class="legend-label">Statut :</span>
  <div class="legend-item"><div class="legend-dot" style="background:#43a047"></div>Terminé</div>
  <div class="legend-item"><div class="legend-dot" style="background:#fb8c00"></div>Dev ongoing</div>
  <div class="legend-item"><div class="legend-dot" style="background:#1e88e5"></div>Ready for dev</div>
  <div class="legend-item"><div class="legend-dot" style="background:#8e24aa"></div>Discovery</div>
  <div class="legend-item"><div class="legend-dot" style="background:#b0bec5"></div>Parking lot</div>
  <div class="legend-item" style="margin-left:8px;border-left:1px solid #eee;padding-left:16px;">
    <div style="width:2px;height:14px;background:#e53935;border-radius:1px;"></div>Aujourd'hui
  </div>
  <div class="legend-item" style="margin-left:4px;">
    <div style="width:14px;height:10px;border-radius:2px;background:repeating-linear-gradient(45deg,#eee,#eee 2px,#fff 2px,#fff 5px);border:1px solid #ddd;"></div>Pause S53
  </div>
  <div class="legend-item" style="margin-left:4px;">
    <div style="width:12px;height:10px;border-radius:2px;background:#f3e5f5;border:1px solid #9c27b0;"></div>Sprint T (4 sem.)
  </div>
</div>

<div class="container">
  <div class="gantt" id="gantt"></div>
</div>

<div id="tooltip"></div>

<script>
// ── Quarters definition ───────────────────────────────────────
const QUARTERS = {
  Q1: { label:'Q1 2026', s:'2025-12-29', e:'2026-03-20', cls:'q1' },
  Q2: { label:'Q2 2026', s:'2026-03-23', e:'2026-07-03', cls:'q2' },
  Q3: { label:'Q3 2026', s:'2026-07-06', e:'2026-09-25', cls:'q3' },
  Q4: { label:'Q4 2026', s:'2026-09-28', e:'2026-12-25', cls:'q4' },
};

// ── Sprints (D→T, calendrier 2026) ──────────────────────────
const SPRINTS = [
  { n:'D', s:'2025-12-29', e:'2026-01-16', q:'Q1' },
  { n:'E', s:'2026-01-19', e:'2026-02-06', q:'Q1' },
  { n:'F', s:'2026-02-09', e:'2026-02-27', q:'Q1' },
  { n:'G', s:'2026-03-02', e:'2026-03-20', q:'Q1', cur:true },
  { n:'H', s:'2026-03-23', e:'2026-04-10', q:'Q2' },
  { n:'I', s:'2026-04-13', e:'2026-05-01', q:'Q2' },
  { n:'J', s:'2026-05-04', e:'2026-05-22', q:'Q2' },
  { n:'K', s:'2026-05-25', e:'2026-06-12', q:'Q2' },
  { n:'L', s:'2026-06-15', e:'2026-07-03', q:'Q2' },
  { n:'M', s:'2026-07-06', e:'2026-07-24', q:'Q3' },
  { n:'N', s:'2026-07-27', e:'2026-08-14', q:'Q3' },
  { n:'O', s:'2026-08-17', e:'2026-09-04', q:'Q3' },
  { n:'P', s:'2026-09-07', e:'2026-09-25', q:'Q3' },
  { n:'Q', s:'2026-09-28', e:'2026-10-16', q:'Q4' },
  { n:'R', s:'2026-10-19', e:'2026-11-06', q:'Q4' },
  { n:'S', s:'2026-11-09', e:'2026-11-27', q:'Q4' },
  { n:'T', s:'2026-11-30', e:'2026-12-25', q:'Q4', last:true },
];

const PAUSE_START = '2026-12-28';
const PAUSE_END   = '2026-12-31';
const TODAY       = '2026-03-09';

// ── Epics data ───────────────────────────────────────────────
const GROUPS = [
  {
    name: 'Tracking & Suivi de livraison',
    epics: [
      { key:'RECI-126', title:'Migration page Rating',               status:'done',  s:null,          e:'2026-01-12' },
      { key:'RECI-83',  title:'Migration Tracking → Recipient API',  status:'done',  s:null,          e:'2026-01-23' },
      { key:'RECI-113', title:'Migration & Refonte Tracking',        status:'done',  s:null,          e:'2026-01-23' },
      { key:'RECI-165', title:'Sortie du mode POC',                  status:'done',  s:'2025-12-29',  e:'2026-02-16' },
      { key:'RECI-146', title:'Fusion pages tracking/décalage',      status:'dev',   s:'2025-12-29',  e:'2026-03-20' },
      { key:'RECI-191', title:'Enrichir page tracking',              status:'dev',   s:'2026-02-09',  e:'2026-03-20' },
      { key:'RECI-200', title:'Content cards page suivi',            status:'ready', s:'2026-03-02',  e:'2026-03-20' },
    ]
  },
  {
    name: 'Décalage & Replanification',
    epics: [
      { key:'RECI-12',  title:'Décalage de créneau automatique',     status:'done',  s:null,         e:'2025-08-22' },
      { key:'RECI-27',  title:'Page de Replannification',            status:'done',  s:null,         e:'2025-08-22' },
      { key:'RECI-131', title:'Horaires ouverture magasins',         status:'done',  s:null,         e:'2026-01-23' },
      { key:'RECI-134', title:'Décalage aux points de retrait',      status:'done',  s:null,         e:'2026-01-23' },
      { key:'RECI-241', title:'Instructions à la livraison',         status:'dev',   s:'2026-03-02', e:'2026-03-20' },
      { key:'RECI-145', title:'Décalage SC',                         status:'ready', s:'2026-03-02', e:'2026-03-20' },
    ]
  },
  {
    name: 'Compte & Préférences',
    epics: [
      { key:'RECI-223', title:'Shadow account',                      status:'dev',       s:'2025-12-28', e:'2026-03-20' },
      { key:'RECI-299', title:'Création compte destinataire',        status:'discovery', s:'2026-03-23', e:'2026-07-03' },
      { key:'RECI-295', title:'Cotransporteurs favoris',             status:'discovery', s:'2026-03-23', e:'2026-07-03' },
    ]
  },
  {
    name: 'Communication & Langue',
    epics: [
      { key:'RECI-292', title:'Gestion de la langue',                status:'ready',   s:'2026-03-02', e:'2026-03-20' },
      { key:'RECI-305', title:'Events reminder / warning',           status:'parking', s:'2026-03-23', e:'2026-04-10' },
    ]
  },
  {
    name: 'Modération',
    epics: [
      { key:'RECI-303', title:'Signalement',                         status:'parking', s:'2026-03-23', e:'2026-07-03' },
    ]
  },
  {
    name: 'Tech & Infra',
    epics: [
      { key:'RECI-91',  title:'Pérénisation PoC replanification',    status:'done',    s:null, e:'2025-11-20' },
      { key:'RECI-270', title:'Upgrade Node 24',                     status:'done',    s:null, e:null },
      { key:'RECI-138', title:'Améliorations Tech - Divers',         status:'parking', s:null, e:null },
      { key:'RECI-240', title:'Horaires points de retrait',          status:'parking', s:null, e:null },
      { key:'RECI-275', title:'UI Improvements',                     status:'parking', s:null, e:null },
      { key:'RECI-290', title:'Impact Split Shop user',              status:'parking', s:null, e:null },
    ]
  },
];

const STATUS_LABELS = {
  done: '✅ Terminé', dev: '🟠 Dev ongoing',
  ready: '🔵 Ready for dev', discovery: '🟣 Discovery', parking: '⬜ Parking lot'
};

// ── Active quarters state ────────────────────────────────────
let activeQs = new Set(['Q1','Q2','Q3','Q4']);

// ── View bounds (computed from active quarters) ──────────────
let viewStart, viewEnd, totalMS;

function computeViewBounds() {
  const sel = [...activeQs].map(k => QUARTERS[k]);
  const startMs = Math.min(...sel.map(q => new Date(q.s).getTime()));
  let   endMs   = Math.max(...sel.map(q => new Date(q.e).getTime()));

  // Include S53 pause when Q4 is visible
  if (activeQs.has('Q4')) {
    endMs = new Date(PAUSE_END).getTime() + 86400000; // +1 day buffer
  }

  viewStart = new Date(startMs - 86400000);  // -1 day padding left
  viewEnd   = new Date(endMs   + 86400000);  // +1 day padding right
  totalMS   = viewEnd - viewStart;
}

function pct(dateStr) {
  return ((new Date(dateStr) - viewStart) / totalMS * 100);
}

function sprintLabel(dateStr) {
  const d = new Date(dateStr);
  for (const sp of SPRINTS) {
    if (d >= new Date(sp.s) && d <= new Date(sp.e)) return 'Sprint ' + sp.n;
  }
  return '';
}

// Returns true if epic has any overlap with [viewStart, viewEnd]
function epicVisible(epic) {
  if (!epic.s && !epic.e) return true; // no dates → always show
  const SPRINT_MS = 21 * 86400000;
  let s = epic.s ? new Date(epic.s) : new Date(new Date(epic.e) - SPRINT_MS);
  let e = epic.e ? new Date(epic.e) : new Date(s.getTime() + SPRINT_MS);
  return e >= viewStart && s <= viewEnd;
}

// ── Render ───────────────────────────────────────────────────
const gantt   = document.getElementById('gantt');
const tooltip = document.getElementById('tooltip');

function render() {
  computeViewBounds();
  gantt.innerHTML = '';

  const todayP  = pct(TODAY);
  const SPRINT_W = pct('2026-01-16') - pct('2025-12-29');
  const pauseL  = activeQs.has('Q4') ? pct(PAUSE_START) : null;
  const pauseW  = activeQs.has('Q4') ? pct(PAUSE_END) - pct(PAUSE_START) : 0;

  // ── Quarter header ──
  const qRow = document.createElement('div');
  qRow.className = 'row q-header-row';
  const qLabel = document.createElement('div');
  qLabel.className = 'label-cell';
  qLabel.textContent = 'Épic';
  qRow.appendChild(qLabel);
  const qTl = document.createElement('div');
  qTl.className = 'tl-cell';

  [...activeQs].sort().forEach(k => {
    const q = QUARTERS[k];
    const left  = pct(q.s);
    const width = pct(q.e) - pct(q.s);
    const c = document.createElement('div');
    c.className = 'q-cell ' + q.cls;
    c.style.left  = left  + '%';
    c.style.width = width + '%';
    c.textContent = q.label;
    qTl.appendChild(c);
  });
  if (pauseL !== null) {
    const pz = document.createElement('div');
    pz.style.cssText = `position:absolute;left:${pauseL}%;width:${pauseW}%;top:0;height:100%;` +
      `background:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(0,0,0,0.06) 4px,rgba(0,0,0,0.06) 8px);`;
    qTl.appendChild(pz);
  }
  qRow.appendChild(qTl);
  gantt.appendChild(qRow);

  // ── Sprint header ──
  const sRow = document.createElement('div');
  sRow.className = 'row s-header-row';
  const sLabel = document.createElement('div');
  sLabel.className = 'label-cell';
  sRow.appendChild(sLabel);
  const sTl = document.createElement('div');
  sTl.className = 'tl-cell';

  SPRINTS.filter(sp => activeQs.has(sp.q)).forEach(sp => {
    const left  = pct(sp.s);
    const width = pct(sp.e) - pct(sp.s);
    const c = document.createElement('div');
    c.className = 's-cell' + (sp.cur ? ' current' : '') + (sp.last ? ' last-sprint' : '');
    c.style.left  = left  + '%';
    c.style.width = width + '%';
    c.textContent = sp.n;
    c.title = 'Sprint ' + sp.n + ' : ' + sp.s + ' → ' + sp.e;
    sTl.appendChild(c);
  });
  if (pauseL !== null) {
    const ps = document.createElement('div');
    ps.style.cssText = `position:absolute;left:${pauseL}%;width:${pauseW}%;top:0;height:100%;` +
      `background:#f0f0f0;display:flex;align-items:center;justify-content:center;` +
      `font-size:9px;color:#bbb;font-weight:600;border-left:1px solid #ddd;`;
    ps.textContent = 'S53';
    sTl.appendChild(ps);
  }
  sRow.appendChild(sTl);
  gantt.appendChild(sRow);

  // ── Groups & epics ──
  GROUPS.forEach(group => {
    const visibleEpics = group.epics.filter(epicVisible);

    // Group header (hidden if no visible epics)
    const gr = document.createElement('div');
    gr.className = 'row group-row' + (visibleEpics.length === 0 ? ' hidden' : '');
    const grLabel = document.createElement('div');
    grLabel.className = 'label-cell';
    grLabel.textContent = group.name;
    gr.appendChild(grLabel);
    gr.appendChild(document.createElement('div')).className = 'tl-cell';
    gantt.appendChild(gr);

    group.epics.forEach(epic => {
      const visible = epicVisible(epic);
      const row = document.createElement('div');
      row.className = 'row' + (visible ? '' : ' hidden');

      const lc = document.createElement('div');
      lc.className = 'label-cell';
      lc.innerHTML = `<span class="epic-key">${epic.key}</span><span class="epic-title">${epic.title}</span>`;
      row.appendChild(lc);

      const tl = document.createElement('div');
      tl.className = 'tl-cell';

      // Pause zone
      if (pauseL !== null) {
        const yz = document.createElement('div');
        yz.className = 'year-end-zone';
        yz.style.left  = pauseL + '%';
        yz.style.width = pauseW + '%';
        tl.appendChild(yz);
      }

      // Today line
      if (new Date(TODAY) >= viewStart && new Date(TODAY) <= viewEnd) {
        const tl2 = document.createElement('div');
        tl2.className = 'today-line';
        tl2.style.left = todayP + '%';
        const tlbl = document.createElement('div');
        tlbl.className = 'today-label';
        tlbl.textContent = 'Auj.';
        tl2.appendChild(tlbl);
        tl.appendChild(tl2);
      }

      // Bar
      if (epic.s || epic.e) {
        let left, width;
        if (epic.s && epic.e) {
          left  = pct(epic.s);
          width = pct(epic.e) - left;
        } else if (!epic.s && epic.e) {
          const ep = pct(epic.e);
          left  = ep - SPRINT_W;
          width = SPRINT_W;
        }

        const bar = document.createElement('div');
        bar.className = 'bar bar-' + epic.status;
        bar.style.left  = left + '%';
        bar.style.width = Math.max(width, 0.6) + '%';
        if (width > 5) bar.textContent = epic.key;

        bar.addEventListener('mouseenter', () => {
          const sLbl = epic.e ? sprintLabel(epic.e) : '';
          tooltip.style.display = 'block';
          tooltip.innerHTML =
            `<div class="t-key">${epic.key}</div>` +
            `<div class="t-title">${epic.title}</div>` +
            `<div class="t-dates">${epic.s ? '▶ ' + epic.s + '  ' : ''}${epic.e ? '→ ' + epic.e : ''}  ${sLbl ? '(' + sLbl + ')' : ''}</div>` +
            `<div class="t-status">${STATUS_LABELS[epic.status]}</div>`;
        });
        bar.addEventListener('mousemove', e => {
          tooltip.style.left = (e.clientX + 14) + 'px';
          tooltip.style.top  = (e.clientY - 8)  + 'px';
        });
        bar.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
      bar.addEventListener('click', () => {
        window.open('https://shopopop.atlassian.net/browse/' + epic.key, '_blank');
      });
        tl.appendChild(bar);
      } else {
        const nd = document.createElement('span');
        nd.className = 'no-date';
        nd.textContent = 'À planifier';
        tl.appendChild(nd);
      }

      row.appendChild(tl);
      gantt.appendChild(row);
    });
  });
}

// ── Filter controls ──────────────────────────────────────────
function toggleQ(q, btn) {
  if (activeQs.has(q)) {
    if (activeQs.size === 1) return; // garder au moins 1 trimestre actif
    activeQs.delete(q);
    btn.className = 'q-btn';
  } else {
    activeQs.add(q);
    btn.className = 'q-btn active-' + q.toLowerCase();
  }
  render();
}

function selectAll() {
  activeQs = new Set(['Q1','Q2','Q3','Q4']);
  document.querySelectorAll('.q-btn').forEach(b => {
    const q = b.dataset.q.toLowerCase();
    b.className = 'q-btn active-' + q;
  });
  render();
}

// ── Init ─────────────────────────────────────────────────────
render();
</script>
